<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cory's Fast Food — Desde el primer mordisco, ya eres fan</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"><\/script>
  <style>
    :root {
      --primary:      #7B1213;
      --primary-dark: #4a0b0c;
      --primary-mid:  #9e1a1b;
      --gold:         #E8A020;
      --gold-light:   #f5c84a;
      --cream:        #F5E6C8;
      --cream-dim:    rgba(245,230,200,0.78);
      --brown:        #6B3A2A;
      --brown-light:  #9e6347;
      --dark:         #2a0e08;
      --darker:       #1e0a06;
      --whatsapp:     #25D366;
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body { background:var(--darker); color:var(--cream); font-family:'Barlow',sans-serif; overflow-x:hidden; }

    .display   { font-family:'Bebas Neue',sans-serif; letter-spacing:0.04em; }
    .condensed { font-family:'Barlow Condensed',sans-serif; }

    /* GLOW */
    @keyframes glowGold {
      0%,100% { box-shadow:0 0 8px 2px var(--gold),0 0 22px 5px rgba(232,160,32,0.3); }
      50%      { box-shadow:0 0 16px 5px var(--gold-light),0 0 40px 10px rgba(232,160,32,0.5); }
    }
    @keyframes glowWA {
      0%,100% { box-shadow:0 0 10px 3px #25D366,0 0 28px 7px rgba(37,211,102,0.35); }
      50%      { box-shadow:0 0 20px 7px #2eec74,0 0 45px 14px rgba(37,211,102,0.55); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(28px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes heroImgIn {
      from { opacity:0; transform:translateX(50px) scale(0.96); }
      to   { opacity:1; transform:translateX(0) scale(1); }
    }

    /* BUTTONS */
    .btn-cta {
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      background:linear-gradient(135deg,var(--gold) 0%,#c87010 100%);
      color:#1a0505; font-family:'Barlow Condensed',sans-serif;
      font-weight:900; font-size:1rem; letter-spacing:0.1em; text-transform:uppercase;
      padding:16px 38px; border-radius:50px; border:none;
      cursor:pointer; text-decoration:none; min-height:52px;
      transition:transform 0.2s,filter 0.2s;
      animation:glowGold 2.5s ease-in-out infinite;
    }
    .btn-cta:hover { transform:translateY(-3px) scale(1.03); filter:brightness(1.1); }
    .btn-outline {
      background:transparent; color:var(--cream);
      border:2px solid rgba(245,230,200,0.55);
      animation:glowGold 3s ease-in-out infinite;
    }
    .btn-outline:hover { background:rgba(245,230,200,0.07); }

    /* WA FLOAT */
    .wa-float {
      position:fixed; bottom:28px; right:28px; z-index:1000;
      width:66px; height:66px; background:var(--whatsapp); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      text-decoration:none; animation:glowWA 2s ease-in-out infinite;
      transition:transform 0.2s;
    }
    .wa-float:hover { transform:scale(1.12); }
    .wa-float svg { width:34px; height:34px; fill:white; }

    /* NAVBAR */
    .navbar {
      position:fixed; top:0; left:0; right:0; z-index:100;
      background:rgba(20,6,3,0.95); backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(232,160,32,0.2);
      padding:10px 28px; display:flex; align-items:center; justify-content:space-between;
    }

    /* LAYOUT */
    section { padding:90px 0; }
    .wrap { max-width:1160px; margin:0 auto; padding:0 24px; }
    .s-tag { font-family:'Barlow Condensed',sans-serif; font-size:0.72rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--gold); opacity:0.85; margin-bottom:10px; }
    .s-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.6rem,6vw,4.8rem); line-height:0.93; color:var(--cream); }
    .s-title span { color:var(--gold); }
    .bar { width:56px; height:3px; background:linear-gradient(90deg,var(--gold),var(--primary)); border-radius:2px; margin:18px 0; }
    .bar-c { margin:18px auto; }

    /* HERO */
    .hero {
      min-height:100vh; position:relative;
      display:flex; align-items:center; overflow:hidden; padding-top:70px;
      background:
        radial-gradient(ellipse at 62% 50%, rgba(180,60,20,0.55) 0%, transparent 52%),
        radial-gradient(ellipse at 100% 80%, rgba(123,18,19,0.4) 0%, transparent 45%),
        radial-gradient(ellipse at 0% 30%, rgba(107,58,42,0.35) 0%, transparent 40%),
        linear-gradient(135deg, #3d1508 0%, #5c1e0a 25%, #7B1213 55%, #3d1508 100%);
    }

      position:absolute; right:0; top:50%; transform:translateY(-50%);

      position:absolute; right:-2%; top:50%; transform:translateY(-50%);
      width:52%; max-width:680px;
      animation:heroImgIn 1.1s 0.3s ease both;
    }

      width:100%; object-fit:cover;
      filter:drop-shadow(-40px 0 80px rgba(80,10,5,0.95));
      mask-image:linear-gradient(to left,black 40%,transparent 100%);
      -webkit-mask-image:linear-gradient(to left,black 40%,transparent 100%);
    }
